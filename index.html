<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passeggiate Romane - Itinerari Tematici</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lora', serif;
            background: #121212;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: 'Cinzel', serif;
        }

        /* === NAVIGATION BAR === */
        #navbar {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        #navbar h1 {
            font-size: 1.8em;
            background: linear-gradient(to right, #d4af37, #f3e5ab);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 10px rgba(212, 175, 55, 0.2);
        }

        #nav-buttons button {
            background: rgba(128, 0, 128, 0.2);
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        #nav-buttons button:hover {
            background: rgba(128, 0, 128, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(128, 0, 128, 0.5);
        }

        /* === VIEWS === */
        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === HOME VIEW === */
        #home-view {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #home-view h2 {
            text-align: center;
            color: #ffffff;
            font-size: 2.8em;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        #home-view .subtitle {
            text-align: center;
            color: #aaaaaa;
            font-size: 1.2em;
            margin-bottom: 50px;
            font-style: italic;
        }

        .itinerari-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .itinerario-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .itinerario-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(128, 0, 128, 0.3);
            border-color: rgba(212, 175, 55, 0.4);
        }

        .card-image {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(128, 0, 128, 0.8);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .card-content {
            padding: 30px;
        }

        .card-content h3 {
            color: #d4af37;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .card-subtitle {
            color: #bbbbbb;
            font-size: 1em;
            margin-bottom: 15px;
            font-style: italic;
        }

        .card-description {
            color: #dddddd;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #d4af37;
        }

        .stat-label {
            font-size: 0.85em;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .card-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, rgba(128, 0, 128, 0.8) 0%, rgba(75, 0, 130, 0.8) 100%);
            color: #fff;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 10px;
            font-size: 1.1em;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, rgba(148, 0, 148, 0.9) 0%, rgba(95, 0, 150, 0.9) 100%);
        }

        /* === ITINERARY VIEW === */
        #itinerary-view {
            display: none;
            min-height: calc(100vh - 65px);
            position: relative;
            flex-direction: column;
        }
        #itinerary-view.active {
            display: flex;
        }

        /* Timeline Sidebar */
        #timeline-sidebar {
            position: relative;
            width: 350px;
            flex-shrink: 0;
            background: rgba(18, 18, 18, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(212, 175, 55, 0.3);
            padding: 25px;
            overflow-y: auto;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #timeline-sidebar.collapsed {
            margin-left: -350px;
        }

        #toggle-sidebar-btn {
            position: absolute;
            right: -40px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-left: none;
            color: #d4af37;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        #toggle-sidebar-btn:hover {
            background: rgba(128, 0, 128, 0.8);
            color: white;
        }

        #timeline-title {
            font-size: 1.4em;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            font-family: 'Cinzel', serif;
            text-align: center;
        }

        #progress-bar {
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #progress-fill {
            background: linear-gradient(90deg, #d4af37, #800080);
            height: 100%;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #timeline-items {
            position: relative;
            padding-left: 30px;
        }

        #timeline-items::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 15px;
            bottom: 30px;
            width: 2px;
            background: linear-gradient(to bottom, #d4af37, rgba(128, 0, 128, 0.5));
            z-index: 0;
        }

        .timeline-item {
            position: relative;
            padding: 15px 15px 15px 20px;
            margin-bottom: 25px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -25px;
            top: 20px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            border: 2px solid #888;
            z-index: 2;
            transition: all 0.3s;
        }

        .timeline-item:hover {
            background: rgba(128, 0, 128, 0.2);
            transform: translateX(5px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .timeline-item.completed {
            background: rgba(0, 0, 0, 0.4);
            opacity: 0.8;
        }

        .timeline-item.completed::before {
            background: #800080;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(128, 0, 128, 0.6);
        }

        .timeline-item.current {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .timeline-item.current::before {
            background: #d4af37;
            border-color: #fff;
            box-shadow: 0 0 15px #d4af37;
            transform: scale(1.4);
        }

        .timeline-item.upcoming::before {
            background: #121212;
            border-color: #555;
        }

        .timeline-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .timeline-icon {
            font-size: 1.5em;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
        }

        .timeline-time {
            font-size: 0.85em;
            color: #d4af37;
            font-weight: bold;
            font-family: 'Cinzel', serif;
        }

        .timeline-name {
            font-size: 1.1em;
            margin-top: 8px;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            line-height: 1.3;
        }

        .timeline-duration {
            font-size: 0.8em;
            color: #aaaaaa;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Main Content */
        #itinerary-content {
            flex: 1;
            display: flex;
            flex-direction: row;
            position: relative;
            overflow: hidden;
        }

        #map-container {
            width: 100%;
            flex-shrink: 0;
            height: 55vh;
            min-height: 400px;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #121212;
        }

        /* Dettagli Tappa */
        #tappa-details {
            flex: 1;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 40px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
        }



        #tappa-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #tappa-numero {
            font-size: 4em;
            color: rgba(212, 175, 55, 0.2);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        #tappa-nome {
            flex: 1;
            margin: 0 25px;
        }

        #tappa-nome h2 {
            color: #ffffff;
            font-size: 2.2em;
            margin-bottom: 5px;
        }

        .descrizione-breve {
            color: #bbbbbb;
            font-style: italic;
            font-size: 1.1em;
        }

        #tappa-orario {
            text-align: right;
        }

        #tappa-orario .time {
            font-size: 1.8em;
            color: #d4af37;
            font-weight: bold;
            font-family: 'Cinzel', serif;
        }

        #tappa-orario .moment {
            font-size: 0.9em;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Esperienza Culturale */
        .esperienza-section {
            margin: 30px 0;
            padding: 25px;
            background: rgba(30, 30, 30, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #800080;
        }

        .esperienza-section h3 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .esperienza-section p {
            margin-bottom: 10px;
            line-height: 1.7;
        }

        /* Audio Player */
        .music-player {
            background: linear-gradient(135deg, rgba(128, 0, 128, 0.2) 0%, rgba(30, 30, 30, 0.8) 100%);
            border: 1px solid rgba(128, 0, 128, 0.3);
            padding: 25px;
            border-radius: 12px;
            color: white;
            margin: 25px 0;
            position: relative;
            z-index: 50;
            pointer-events: auto;
        }

        .music-player h4 {
            margin-bottom: 15px;
            font-size: 1.3em;
            color: #d4af37;
        }

        .music-player audio {
            width: 100%;
            margin-bottom: 15px;
            color-scheme: dark;
            position: relative;
            z-index: 60;
            pointer-events: auto;
        }

        .music-description {
            font-size: 0.95em;
            line-height: 1.7;
            color: #cccccc;
        }

        /* Citazione Letteraria */
        .citazione-box {
            background: rgba(212, 175, 55, 0.05);
            border-left: 4px solid #d4af37;
            padding: 25px;
            border-radius: 12px;
            margin: 30px 0;
            position: relative;
        }

        .citazione-box::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 20px;
            font-size: 4em;
            color: rgba(212, 175, 55, 0.2);
            font-family: 'Cinzel', serif;
            line-height: 1;
        }

        .citazione-text {
            font-size: 1.25em;
            font-style: italic;
            line-height: 1.8;
            color: #e0e0e0;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .citazione-author {
            text-align: right;
            color: #d4af37;
            font-size: 1.05em;
            font-family: 'Cinzel', serif;
        }

        /* Atmosfera */
        .atmosfera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .atmosfera-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .atmosfera-item:hover {
            background: rgba(128, 0, 128, 0.1);
            border-color: rgba(128, 0, 128, 0.3);
        }

        .atmosfera-item .icon {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .atmosfera-item .label {
            font-size: 0.85em;
            color: #888888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .atmosfera-item .value {
            font-weight: bold;
            color: #ffffff;
            font-size: 1.05em;
        }

        /* Navigation Buttons */
        #tappa-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-btn.prev {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaaaaa;
        }

        .nav-btn.prev:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .nav-btn.next {
            background: linear-gradient(135deg, #800080 0%, #4b0082 100%);
            color: #ffffff;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 5px 15px rgba(128, 0, 128, 0.2);
        }

        .nav-btn.next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(128, 0, 128, 0.4);
            border-color: rgba(212, 175, 55, 0.6);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #121212;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(128, 0, 128, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.6);
        }

        /* Responsive */
        @media (max-width: 900px) {
            #tappa-details {
                padding-left: 20px;
                padding-right: 20px;
            }

            #itinerary-view {
                flex-direction: column;
            }

            #itinerary-content {
                flex-direction: column;
            }

            #timeline-sidebar {
                position: relative;
                width: 100%;
                height: 180px;
                display: flex;
                flex-direction: column;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                transform: none !important;
                margin-left: 0 !important;
            }

            #toggle-sidebar-btn {
                display: none;
            }

            #timeline-items {
                display: flex;
                overflow-x: auto;
                gap: 15px;
                padding-bottom: 10px;
                padding-left: 0;
            }

            #timeline-items::before, .timeline-item::before {
                display: none;
            }

            .timeline-item {
                min-width: 250px;
                margin-bottom: 0;
            }

            .itinerari-grid {
                grid-template-columns: 1fr;
            }
        }

        /* === CHATBOT === */
        #chatbot-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 450px;
            height: 75vh;
            max-height: 800px;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            z-index: 10000;
            overflow: hidden;
            transition: all 0.3s ease;
            transform-origin: bottom right;
        }

        #chatbot-container.collapsed {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        #chatbot-header {
            background: rgba(18, 18, 18, 0.9);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-weight: bold;
        }

        #chatbot-header .title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #chatbot-header .title img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #d4af37;
            object-fit: cover;
        }

        #chatbot-close {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 1.2em;
            cursor: pointer;
            transition: color 0.3s;
        }

        #chatbot-close:hover {
            color: #d4af37;
        }

        #chatbot-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-msg {
            max-width: 90%;
            padding: 14px 18px;
            border-radius: 15px;
            font-size: 1em;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .chat-msg p {
            margin-bottom: 10px;
        }

        .chat-msg p:last-child {
            margin-bottom: 0;
        }

        .chat-msg ul, .chat-msg ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .chat-msg li {
            margin-bottom: 5px;
        }

        .chat-msg.bot {
            align-self: flex-start;
            background: rgba(128, 0, 128, 0.3);
            border: 1px solid rgba(128, 0, 128, 0.5);
            color: #e0e0e0;
            border-bottom-left-radius: 2px;
        }

        .chat-msg.user {
            align-self: flex-end;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        #chatbot-input-area {
            padding: 15px;
            background: rgba(18, 18, 18, 0.8);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            gap: 10px;
        }

        #chatbot-input {

        "Macchina fotografica (non per la Cripta)",
        "Senso dell'umorismo e spirito critico"
      ]
    }
  ];
        }

        // ========================================
        // RENDERING HOME
        // ========================================
        function renderItinerariCards() {
            const container = document.getElementById('itinerari-container');
            container.innerHTML = '';

            itinerariData.forEach(itinerario => {
                const card = document.createElement('div');
                card.className = 'itinerario-card';
                card.onclick = () => startItinerario(itinerario.id);

                card.innerHTML = `
                    <div class="card-image" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('${itinerario.immagine_copertina || 'https://images.unsplash.com/photo-1525874684015-58379d421a52?auto=format&fit=crop&w=600&q=80'}')">
                        <div class="card-badge">${itinerario.tema || 'Culturale'}</div>
                    </div>
                    <div class="card-content">
                        <h3>${itinerario.nome}</h3>
                        
                        <p class="card-subtitle">${itinerario.sottotitolo || ''}</p>
                        <p class="card-description">${itinerario.descrizione}</p>
                        
                        <div class="card-stats">
                            <div class="stat">
                                <div class="stat-value">⏱️ ${itinerario.durata_totale_ore}</div>
                                <div class="stat-label">Durata</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">📍 ${itinerario.tappe.length}</div>
                                <div class="stat-label">Tappe</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">🚶 ${itinerario.distanza_totale_km}km</div>
                                <div class="stat-label">Distanza</div>
                            </div>
                        </div>
                        
                        <button class="card-button">Inizia Passeggiata →</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ========================================
        // START ITINERARIO
        // ========================================
        function startItinerario(itinerarioId) {
            currentItinerario = itinerariData.find(it => it.id === itinerarioId);
            if (!currentItinerario) return;

            currentTappaIndex = 0;

            showView('itinerary');
            initMap();
            document.getElementById('timeline-items').innerHTML = '';
            renderTimeline();
            loadTappa(0);
        }

        // ========================================
        // GESTIONE VIEWS
        // ========================================
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${viewName}-view`).classList.add('active');

            const backBtn = document.getElementById('back-to-itinerary-btn');
            if (viewName === 'home' && currentItinerario) {
                backBtn.style.display = 'inline-block';
            } else {
                backBtn.style.display = 'none';
            }

            if (viewName === 'itinerary' && map) {
                setTimeout(() => map.invalidateSize(), 100);
            }
        }

        // ========================================
        // MAPPA
        // ========================================
        function initMap() {
            if (map) map.remove();

            map = L.map('map', { attributionControl: false }).setView([41.9028, 12.4964], 13);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            drawRoute();
            addMarkers();
        }

        function drawRoute() {
            const coordinates = currentItinerario.tappe.map(t => t.coordinate);

            if (routeLine) map.removeLayer(routeLine);

            const routeColor = (currentItinerario.mappa_percorso && currentItinerario.mappa_percorso.colore_percorso) ? currentItinerario.mappa_percorso.colore_percorso : '#d4af37';

            routeLine = L.polyline(coordinates, {
                color: routeColor,
                weight: 5,
                opacity: 0.8,
                dashArray: '10, 10',
                lineJoin: 'round'
            }).addTo(map);

            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
        }

        function addMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            currentItinerario.tappe.forEach((tappa, index) => {
                const icon = momentIcons[tappa.momento_giornata] || '📍';

                const marker = L.marker(tappa.coordinate, {
                    icon: L.divIcon({
                        html: `<div style="font-size: 2em;">${icon}</div>`,
                        className: 'custom-marker',
                        iconSize: [40, 40]
                    })
                }).addTo(map);

                const popupImage = tappa.immagine ? `<div style="margin-top: 8px; text-align: center;"><img src="${tappa.immagine}" style="width: 100%; max-width: 180px; height: auto; border-radius: 6px; border: 1px solid #d4af37;" alt="${tappa.nome}"></div>` : '';
                marker.bindPopup(`<div style="text-align: center; font-family: 'Cinzel', serif;"><b>Tappa ${tappa.numero}</b><br>${tappa.nome}${popupImage}</div>`);
                marker.on('click', () => loadTappa(index));

                markers.push(marker);
            });
        }

        // ========================================
        // TIMELINE
        // ========================================
        function renderTimeline() {
            const container = document.getElementById('timeline-items');

            if (container.children.length === 0) {
                currentItinerario.tappe.forEach((tappa, index) => {
                    const item = document.createElement('div');
                    item.className = 'timeline-item';
                    
                    item.onclick = () => loadTappa(index);

                    item.innerHTML = `
                        <div class="timeline-item-header">
                            <div class="timeline-time">${tappa.orario_consigliato}</div>
                            <div class="timeline-icon">${momentIcons[tappa.momento_giornata]}</div>
                        </div>
                        <div class="timeline-name">${tappa.nome}</div>
                        <div class="timeline-duration">⏱️ ${tappa.durata_visita_min} min</div>
                    `;

                    container.appendChild(item);
                });
            }

            Array.from(container.children).forEach((item, index) => {
                item.classList.remove('completed', 'current', 'upcoming');
                
                if (index < currentTappaIndex) {
                    item.classList.add('completed');
                } else if (index === currentTappaIndex) {
                    item.classList.add('current');
                    // Scroll sidebar smoothly to the active item
                    setTimeout(() => {
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 50);
                } else {
                    item.classList.add('upcoming');
                }
            });

            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentTappaIndex + 1) / currentItinerario.tappe.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        // ========================================
        // CARICA TAPPA
        // ========================================
        function loadTappa(index) {
            currentTappaIndex = index;
            const tappa = currentItinerario.tappe[index];

            // Header
            document.getElementById('tappa-numero').textContent = `${tappa.numero}`;
            document.querySelector('#tappa-nome h2').textContent = tappa.nome;
            document.querySelector('#tappa-nome .descrizione-breve').textContent = tappa.descrizione_breve || '';
            document.querySelector('#tappa-orario .time').textContent = tappa.orario_consigliato;
            document.querySelector('#tappa-orario .moment').textContent = tappa.momento_giornata;

            // Content
            renderTappaContent(tappa);

            // Timeline
            renderTimeline();

            // Scroll in alto i dettagli della tappa
            document.getElementById('tappa-details').scrollTop = 0;

            // Mappa: centra su tappa corrente
            map.setView(tappa.coordinate, 16, { animate: true });
            markers[index].openPopup();

            // Buttons
            document.querySelector('.nav-btn.prev').disabled = index === 0;
            document.querySelector('.nav-btn.next').disabled = index === currentItinerario.tappe.length - 1;
        }

        function renderTappaContent(tappa) {
            const container = document.getElementById('tappa-content');
            container.innerHTML = '';

            // Storia e Curiosità
            if (tappa.storia || tappa.curiosita) {
                const storiaSec = document.createElement('div');
                storiaSec.className = 'esperienza-section';
                storiaSec.innerHTML = `
                    <h3>📜 Storia e Curiosità</h3>
                    ${tappa.storia ? `<p><strong>Storia:</strong> ${tappa.storia}</p>` : ''}
                    ${tappa.curiosita ? `<p><strong>Curiosità:</strong> ${tappa.curiosita}</p>` : ''}
                `;
                container.appendChild(storiaSec);
            }

            // Esperienza Culturale
            if (tappa.esperienza_culturale) {
                const exp = tappa.esperienza_culturale;

                // Musica
                if (exp.musica) {
                    const musicDiv = document.createElement('div');
                    musicDiv.className = 'music-player';
                    const audioSrc = exp.musica.file_url || `audio/${tappa.poi_id}.mp3`;
                    musicDiv.innerHTML = `
                        <h4>🎵 ${exp.musica.movimento || 'Brano Musicale'}</h4>
                        <audio controls>
                            <source src="${audioSrc}" type="audio/mpeg">
                            Il tuo browser non supporta l'audio.
                        </audio>
                        <div class="music-description">
                            ${exp.musica.descrizione_musicale || ''}
                        </div>
                    `;
                    container.appendChild(musicDiv);
                }

                // Letteratura
                if (exp.letteratura) {
                    const litDiv = document.createElement('div');
                    litDiv.className = 'citazione-box';
                    litDiv.innerHTML = `
                        <div class="citazione-text">"${exp.letteratura.citazione}"</div>
                        <div class="citazione-author">— ${exp.letteratura.autore}, <em>${exp.letteratura.opera}</em> (${exp.letteratura.anno})</div>
                    `;
                    container.appendChild(litDiv);
                }

                // Atmosfera
                if (exp.atmosfera) {
                    const atmDiv = document.createElement('div');
                    atmDiv.className = 'esperienza-section';
                    atmDiv.innerHTML = `
                        <h3>🌤️ Atmosfera del Luogo</h3>
                        <div class="atmosfera-grid">
                            <div class="atmosfera-item">
                                <div class="icon">💡</div>
                                <div class="label">Luce</div>
                                <div class="value">${exp.atmosfera.luce || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">🌡️</div>
                                <div class="label">Temperatura</div>
                                <div class="value">${exp.atmosfera.temperatura_stimata || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">👥</div>
                                <div class="label">Affollamento</div>
                                <div class="value">${exp.atmosfera.affollamento || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">😌</div>
                                <div class="label">Emozione</div>
                                <div class="value">${exp.atmosfera.emozione_target || 'N/A'}</div>
                            </div>
                        </div>
                        ${exp.atmosfera.consiglio_fotografico ? `<p style="margin-top: 15px;"><strong>📸 Fotografia:</strong> ${exp.atmosfera.consiglio_fotografico}</p>` : ''}
                    `;
                    container.appendChild(atmDiv);
                }
            }
        }

        // ========================================
        // NAVIGAZIONE TAPPE
        // ========================================
        function previousTappa() {
            if (currentTappaIndex > 0) {
                loadTappa(currentTappaIndex - 1);
            }
        }

        function nextTappa() {
            if (currentTappaIndex < currentItinerario.tappe.length - 1) {
                loadTappa(currentTappaIndex + 1);
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('timeline-sidebar');
            const btnIcon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                btnIcon.textContent = '▶';
            } else {
                btnIcon.textContent = '◀';
            }
        }

        // ========================================
        // AVVIO
        // ========================================
        window.addEventListener('DOMContentLoaded', init);

        // ========================================
        // CHATBOT LOGIC (LOCAL DATA ONLY)
        // ========================================
        
        let chatHistory = [];

        function toggleChatbot() {
            const container = document.getElementById('chatbot-container');
            const btn = document.getElementById('chatbot-toggle-btn');
            
            if (container.classList.contains('collapsed')) {
                container.classList.remove('collapsed');
                btn.classList.add('hidden');
                document.getElementById('chatbot-input').focus();
            } else {
                container.classList.add('collapsed');
                btn.classList.remove('hidden');
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        async function sendChatMessage() {
            const inputField = document.getElementById('chatbot-input');
            const message = inputField.value.trim();
            
            if (!message) return;
            
            // Add user message
            addChatMessage(message, 'user');
            inputField.value = '';
            
            // Call simulated AI using local data
            await generateBotResponse(message);
        }

        function addChatMessage(text, sender) {
            const messagesContainer = document.getElementById('chatbot-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg ${sender}`;
            
            // Parsing Markdown usando marked.js per renderizzare liste, grassetti e spazi correttamente
            if (typeof marked !== 'undefined') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                let fallback = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                fallback = fallback.replace(/\n/g, '<br>');
                msgDiv.innerHTML = fallback;
            }
            
            messagesContainer.appendChild(msgDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function generateBotResponse(message) {
            // Aggiungi indicatore di caricamento
            const messagesContainer = document.getElementById('chatbot-messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = `chat-msg bot`;
            loadingDiv.id = 'chat-loading';
            loadingDiv.textContent = "...sto consultando i miei appunti...";
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                // Simula un po' di latenza
                await new Promise(resolve => setTimeout(resolve, 800));

                let replyText = "";
                let found = false;
                
                const messageLower = message.toLowerCase();
                const queryWords = messageLower.split(/\s+/).filter(w => w.length > 3);

                // Ricerca nei dati degli itinerari
                if (itinerariData) {
                    for (const itin of itinerariData) {
                        for (const tappa of itin.tappe) {
                            const tappaText = (tappa.nome + " " + (tappa.descrizione_breve || "") + " " + (tappa.storia || "") + " " + (tappa.curiosita || "")).toLowerCase();
                            
                            // Cerca corrispondenze
                            if (messageLower.includes(tappa.nome.toLowerCase()) || 
                                (queryWords.length > 0 && queryWords.some(word => tappaText.includes(word)))) {
                                
                                replyText = `A proposito di **${tappa.nome}**...\n\n`;
                                if (tappa.esperienza_culturale && tappa.esperienza_culturale.letteratura) {
                                    replyText += `Come scrissi a suo tempo: *"${tappa.esperienza_culturale.letteratura.citazione}"*\n\n`;
                                }
                                if (tappa.storia) {
                                    replyText += `${tappa.storia}\n\n`;
                                }
                                if (tappa.curiosita) {
                                    replyText += `**Una curiosità:** ${tappa.curiosita}`;
                                }
                                found = true;
                                break;
                            }
                        }
                        if (found) break;
                        
                        // Controllo generico sull'itinerario
                        if (messageLower.includes(itin.nome.toLowerCase()) || messageLower.includes("itinerari") || messageLower.includes("percorso")) {
                            replyText = `L'itinerario "**${itin.nome}**" dura circa ${itin.durata_totale_ore} ed è lungo ${itin.distanza_totale_km}km. ${itin.descrizione}\n\nTi consiglio di visitare le seguenti tappe:\n`;
                            itin.tappe.forEach(t => {
                                replyText += `- **${t.nome}**\n`;
                            });
                            found = true;
                            break;
                        }
                    }
                }

                if (!found) {
                    if (messageLower.includes("ciao") || messageLower.includes("salve") || messageLower.includes("buongiorno")) {
                        replyText = "Salve a te, viaggiatore! Sono pronto a parlarti dei miei viaggi a Roma. Chiedimi del Colosseo, di San Pietro, del Pantheon o della Cripta dei Cappuccini.";
                    } else if (messageLower.includes("grazie")) {
                        replyText = "Prego! C'è altro che vorresti sapere sui nostri percorsi romani?";
                    } else {
                        replyText = "Mi dispiace, nei miei appunti attuali non trovo nulla di preciso a riguardo. Prova a chiedermi delle tappe del nostro itinerario, come il Pantheon, il Colosseo o Castel Sant'Angelo!";
                    }
                }

                document.getElementById('chat-loading').remove();
                addChatMessage(replyText, 'bot');
            } catch (error) {
                console.error("Errore nel chatbot locale:", error);
                if (document.getElementById('chat-loading')) document.getElementById('chat-loading').remove();
                addChatMessage("Perdonami, i miei appunti sono momentaneamente in disordine. Riprova più tardi.", 'bot');
            }
        }
    </script>

    <!-- CHATBOT UI -->
    <button id="chatbot-toggle-btn" onclick="toggleChatbot()">💬</button>

    <div id="chatbot-container" class="collapsed">
        <div id="chatbot-header">
            <div class="title">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/25/Mark_Twain%2C_Brady-Handy_photo_portrait%2C_Feb_7%2C_1871%2C_cropped.jpg" alt="Mark Twain">
                <span>Mark Twain</span>
            </div>
            <button id="chatbot-close" onclick="toggleChatbot()">✖</button>
        </div>
        <div id="chatbot-messages">
            <div class="chat-msg bot">Benvenuto, viaggiatore! Sono Mark Twain. Chiedimi pure qualsiasi cosa su Roma, le sue rovine o le bizzarre abitudini di noi turisti.</div>
        </div>
        <div id="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="Chiedi qualcosa..." onkeypress="handleChatKeyPress(event)">
            <button id="chatbot-send" onclick="sendChatMessage()">➤</button>
        </div>
    </div>
</body>

</html>
